<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture Canvas</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #0b0d0c;
  --surface:    #111312;
  --surface2:   #161918;
  --border:     #1c1f1e;
  --border-hi:  #252a28;
  --amber:      #e8a020;
  --amber-dim:  #6a4a10;
  --amber-glow: #e8a01a18;
  --green:      #3ddc84;
  --green-dim:  #174d30;
  --red:        #e85050;
  --blue:       #7a9ae8;
  --text:       #c2cec2;
  --text-mid:   #7a8a7a;
  --text-dim:   #455045;
  --mono:       'IBM Plex Mono', monospace;
  --radius:     3px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.025) 3px, rgba(0,0,0,0.025) 4px);
  pointer-events: none; z-index: 9999;
}

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; gap: 16px;
  z-index: 200; position: relative;
}
.topbar-left { display: flex; align-items: baseline; gap: 14px; }
.app-name { font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber); }
.app-sub  { font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; }

.topbar-center { display: flex; align-items: center; gap: 10px; flex: 1; max-width: 500px; }
.master-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); white-space: nowrap; }
.master-date  { font-size: 10px; color: var(--amber); white-space: nowrap; min-width: 90px; text-align: right; }

.master-slider-wrap { flex: 1; position: relative; height: 20px; display: flex; align-items: center; }
.master-track { position: absolute; left: 0; right: 0; height: 2px; background: var(--border-hi); border-radius: 1px; }
.master-fill  { position: absolute; left: 0; height: 2px; background: var(--amber); border-radius: 1px; box-shadow: 0 0 8px var(--amber-dim); transition: width 0.15s ease; }
input[type=range].master-input { position: absolute; left: 0; right: 0; width: 100%; opacity: 0; height: 20px; cursor: pointer; z-index: 2; }

.topbar-right { display: flex; align-items: center; gap: 8px; }
.tbtn {
  padding: 5px 10px; background: transparent;
  border: 1px solid var(--border-hi); color: var(--text-mid);
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; border-radius: var(--radius);
  transition: all 0.12s; white-space: nowrap;
}
.tbtn:hover  { border-color: var(--amber-dim); color: var(--amber); background: var(--amber-glow); }
.tbtn.active { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }
.play-tbtn   { padding: 5px 12px; border-color: var(--amber-dim); color: var(--amber); font-size: 11px; }

/* ── CANVAS ── */
.canvas-outer { flex: 1; overflow: auto; position: relative; }
.canvas-outer::-webkit-scrollbar { width: 8px; height: 8px; }
.canvas-outer::-webkit-scrollbar-track { background: var(--bg); }
.canvas-outer::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }

.canvas-inner {
  position: relative; width: 2400px; height: 1600px;
  background-image: radial-gradient(circle, #1c201e 1px, transparent 1px);
  background-size: 28px 28px;
  background-color: var(--bg);
}

/* ── TILE ── */
.tile {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  transition: border-color 0.2s, box-shadow 0.2s;
  overflow: hidden; /* clips resize handle cleanly */
  min-width: 280px; min-height: 260px;
}
.tile:hover    { border-color: var(--border-hi); box-shadow: 0 6px 32px rgba(0,0,0,0.5); }
.tile.detached { border-color: var(--amber-dim); box-shadow: 0 0 0 1px var(--amber-dim), 0 6px 32px rgba(0,0,0,0.5); }
.tile.dragging { border-color: var(--amber); box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 0 1px var(--amber); z-index: 500 !important; transition: none; }
.tile.resizing { border-color: var(--blue); box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 0 1px var(--blue); transition: none; }

/* tile header — drag handle */
.tile-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: var(--surface2);
  border-radius: var(--radius) var(--radius) 0 0;
  cursor: grab;
}
.tile-head:active { cursor: grabbing; }
.tile-drag-icon { font-size: 10px; color: var(--text-dim); margin-right: 7px; pointer-events: none; }
.tile-title     { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; color: var(--text); text-transform: uppercase; flex: 1; pointer-events: none; }
.tile-head-right { display: flex; align-items: center; gap: 5px; }

.sync-badge {
  font-size: 8px; padding: 1px 5px; border-radius: 2px;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: all 0.12s; border: 1px solid;
}
.sync-badge.synced   { border-color: var(--green-dim); color: var(--green); background: rgba(61,220,132,0.06); }
.sync-badge.detached { border-color: var(--amber-dim); color: var(--amber); background: var(--amber-glow); }

/* source toggle btn in header */
.src-btn {
  font-size: 8px; padding: 1px 5px; border-radius: 2px;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: all 0.12s;
  border: 1px solid var(--border-hi); color: var(--text-dim);
  background: transparent;
  font-family: var(--mono);
}
.src-btn:hover  { border-color: var(--blue); color: var(--blue); }
.src-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(122,154,232,0.08); }

/* diagram area — fills available height */
.tile-body {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 100px;
}

.tile-diagram {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 8px;
  transition: opacity 0.15s;
  overflow: hidden;
}
.tile-diagram.fading { opacity: 0; }
.tile-diagram svg { max-width: 100%; max-height: 100%; height: auto !important; width: auto !important; }
.tile-err { font-size: 9px; color: var(--red); text-align: center; padding: 12px; }

/* source view */
.tile-source {
  position: absolute; inset: 0;
  display: none;
  overflow: auto;
  padding: 12px 14px;
  background: var(--bg);
}
.tile-source.visible { display: block; }
.tile-source::-webkit-scrollbar { width: 4px; }
.tile-source::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
.tile-source pre {
  font-family: var(--mono);
  font-size: 10px;
  line-height: 1.7;
  color: var(--blue);
  white-space: pre;
  tab-size: 2;
}
/* simple syntax colouring via CSS — keywords amber, node labels green-ish */
.tile-source .src-comment { color: var(--text-dim); }

/* tile footer */
.tile-footer {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding: 6px 10px 7px;
  background: var(--surface2);
}
.tile-version-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.tile-v-label   { font-size: 9px; color: var(--text-mid); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tile-v-badge   { font-size: 7px; padding: 1px 4px; border-radius: 2px; letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0; margin-left: 6px; }
.badge-init     { background: #1a1a3a; color: #7a9ae8; }
.badge-add      { background: var(--green-dim); color: var(--green); }
.badge-change   { background: #3a2800; color: var(--amber); }
.badge-remove   { background: #3a1a1a; color: var(--red); }
.tile-v-counter { font-size: 8px; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }

.mini-timeline { display: flex; align-items: center; gap: 5px; }
.mini-btn {
  width: 15px; height: 15px; background: transparent;
  border: 1px solid var(--border-hi); color: var(--text-dim);
  font-size: 8px; cursor: pointer; border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.1s; padding: 0; line-height: 1;
}
.mini-btn:hover { border-color: var(--amber-dim); color: var(--amber); }
.mini-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.mini-btn:disabled:hover { border-color: var(--border-hi); color: var(--text-dim); }

.mini-track-wrap { flex: 1; position: relative; height: 14px; display: flex; align-items: center; }
.mini-track-bg   { position: absolute; left: 0; right: 0; height: 1px; background: var(--border-hi); }
.mini-track-fill { position: absolute; left: 0; height: 1px; background: var(--amber); transition: width 0.15s; }
.mini-dots-row   { position: absolute; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; }
.mini-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border-hi); border: 1px solid var(--border-hi);
  cursor: pointer; transition: all 0.1s; flex-shrink: 0;
}
.mini-dot.past { background: var(--amber-dim); border-color: var(--amber-dim); }
.mini-dot.cur  { background: var(--amber); border-color: var(--amber); box-shadow: 0 0 4px var(--amber); width: 7px; height: 7px; }
input[type=range].mini-range { position: absolute; left: 0; right: 0; width: 100%; opacity: 0; height: 14px; cursor: pointer; z-index: 2; }

/* ── RESIZE HANDLE ── */
.resize-handle {
  position: absolute;
  bottom: 0; right: 0;
  width: 18px; height: 18px;
  cursor: se-resize;
  z-index: 10;
  display: flex; align-items: flex-end; justify-content: flex-end;
  padding: 3px;
}
.resize-handle::after {
  content: '';
  display: block;
  width: 8px; height: 8px;
  border-right: 2px solid var(--border-hi);
  border-bottom: 2px solid var(--border-hi);
  border-radius: 0 0 2px 0;
  transition: border-color 0.15s;
}
.tile:hover .resize-handle::after { border-color: var(--text-dim); }
.tile.resizing .resize-handle::after { border-color: var(--blue); }

/* ── ANIMATIONS ── */
@keyframes border-flash {
  0%   { border-color: var(--green); box-shadow: 0 0 16px rgba(61,220,132,0.2); }
  100% { border-color: var(--border); box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
}
.tile.flash { animation: border-flash 0.7s ease-out forwards; }

/* ── MINIMAP ── */
.minimap {
  position: fixed; bottom: 28px; left: 16px;
  width: 160px; height: 100px;
  background: var(--surface); border: 1px solid var(--border-hi);
  border-radius: var(--radius); overflow: hidden; z-index: 300; opacity: 0.85;
}
.minimap-viewport {
  position: absolute; border: 1px solid var(--amber);
  background: rgba(232,160,32,0.06); pointer-events: none; transition: all 0.1s;
}
.minimap-dot { position: absolute; background: var(--border-hi); border-radius: 1px; }

/* ── LEGEND ── */
.legend {
  position: fixed; bottom: 0; right: 0;
  padding: 5px 14px;
  background: var(--surface); border-top: 1px solid var(--border); border-left: 1px solid var(--border);
  font-size: 8px; color: var(--text-dim); letter-spacing: 0.06em;
  display: flex; gap: 14px; z-index: 300;
}
.legend span { color: var(--text-mid); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="app-name">Arch Canvas</span>
    <span class="app-sub">drag · resize · timeline</span>
  </div>
  <div class="topbar-center">
    <span class="master-label">Master</span>
    <div class="master-slider-wrap">
      <div class="master-track"></div>
      <div class="master-fill" id="master-fill"></div>
      <input type="range" class="master-input" id="master-range" min="0" step="1" value="0"
             oninput="onMasterInput(this.value)">
    </div>
    <span class="master-date" id="master-date">—</span>
  </div>
  <div class="topbar-right">
    <button class="tbtn play-tbtn" id="btn-play" onclick="togglePlay()">▶</button>
    <button class="tbtn" onclick="cycleSpeed()" id="btn-speed">1×</button>
    <button class="tbtn" onclick="syncAll()">Sync All</button>
    <button class="tbtn" onclick="resetLayout()">Reset Layout</button>
  </div>
</div>

<div class="canvas-outer" id="canvas-outer">
  <div class="canvas-inner" id="canvas-inner"></div>
</div>

<div class="minimap" id="minimap">
  <div class="minimap-viewport" id="minimap-vp"></div>
</div>

<div class="legend">
  <span>⠿ Drag header · ↘ Resize corner</span>
  <span style="color:var(--green)">● Synced</span>
  <span style="color:var(--amber)">● Detached</span>
  <span style="color:var(--blue)">⌥ Src</span>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════
const diagrams = [
  {
    id:'core-net', title:'Core Network',
    versions:[
      {ts:'2024-01',label:'Single core',changeType:'init',src:`graph TD
  ISP-->FW[Firewall]
  FW-->CORE[Core Switch]
  CORE-->WS[Workstations]
  CORE-->SRV[Servers]
  style FW fill:#2a1a1a,stroke:#e85050,color:#c8d4c8
  style CORE fill:#1a1a2a,stroke:#7a9ae8,color:#c8d4c8`},
      {ts:'2024-04',label:'Distribution added',changeType:'add',src:`graph TD
  ISP-->FW[Firewall]
  FW-->DIST[Distribution ★]
  DIST-->ACC1[Access Fl.1]
  DIST-->ACC2[Access Fl.2]
  DIST-->SRV[Servers]
  ACC1-->WS1[Workstations]
  ACC2-->WS2[Workstations]
  style FW fill:#2a1a1a,stroke:#e85050,color:#c8d4c8
  style DIST fill:#1e1e2e,stroke:#e8a020,color:#e8a020`},
      {ts:'2024-09',label:'Floor 2 consolidated',changeType:'remove',src:`graph TD
  ISP-->FW[Firewall]
  FW-->DIST[Distribution]
  DIST-->ACC[Access — all floors ✕]
  DIST-->SRV[Servers]
  ACC-->WS[Workstations]
  style FW fill:#2a1a1a,stroke:#e85050,color:#c8d4c8
  style DIST fill:#1e1e2e,stroke:#e8a020,color:#e8a020
  style ACC fill:#2a1a1a,stroke:#e85050,color:#e85050`},
      {ts:'2025-02',label:'Current state',changeType:'change',src:`graph TD
  ISP-->FW[Firewall]
  FW-->DIST[Distribution]
  DIST-->ACC[Access Switch]
  DIST-->SRV[Servers]
  DIST-->MGMT[Mgmt VLAN 99]
  ACC-->WS[Workstations]
  ACC-->VOIP[VoIP VLAN 40]
  style FW fill:#2a1a1a,stroke:#e85050,color:#c8d4c8
  style DIST fill:#1e1e2e,stroke:#e8a020,color:#e8a020
  style MGMT fill:#1a1a1a,stroke:#2a3330,color:#5a6a5a`}
    ]
  },
  {
    id:'azure', title:'Azure Hybrid',
    versions:[
      {ts:'2024-06',label:'VPN only',changeType:'init',src:`graph TD
  ONPREM[On-Prem]-->VPN[VPN Gateway]
  VPN-->VNET[Azure VNet]
  VNET-->VM1[VM — Prod]
  style VPN fill:#10182a,stroke:#7a9ae8,color:#7a9ae8
  style VNET fill:#10182a,stroke:#7a9ae8,color:#c8d4c8`},
      {ts:'2024-09',label:'Hub-spoke',changeType:'add',src:`graph TD
  ONPREM[On-Prem]-->ER[ExpressRoute ★]
  ER-->HUB[Hub VNet ★]
  HUB-->SPOKE1[Prod Spoke ★]
  HUB-->SPOKE2[Dev Spoke ★]
  SPOKE1-->VM1[VM — Prod]
  SPOKE2-->VM2[VM — Dev]
  style ER fill:#1e2e1e,stroke:#3ddc84,color:#3ddc84
  style HUB fill:#10182a,stroke:#7a9ae8,color:#7a9ae8
  style SPOKE1 fill:#10182a,stroke:#7a9ae8,color:#c8d4c8`},
      {ts:'2025-01',label:'Firewall added',changeType:'add',src:`graph TD
  ONPREM[On-Prem]-->ER[ExpressRoute]
  ER-->HUB[Hub VNet]
  HUB-->AFW[Azure Firewall ★]
  AFW-->SPOKE1[Prod Spoke]
  AFW-->SPOKE2[Dev Spoke]
  style ER fill:#1e2e1e,stroke:#3ddc84,color:#3ddc84
  style HUB fill:#10182a,stroke:#7a9ae8,color:#7a9ae8
  style AFW fill:#2a1a1a,stroke:#e85050,color:#e85050`}
    ]
  },
  {
    id:'fw-zones', title:'Firewall Zones',
    versions:[
      {ts:'2024-01',label:'Basic 3-zone',changeType:'init',src:`graph LR
  UNTRUST[Untrust]-->DMZ
  DMZ-->TRUST[Trust]
  TRUST-->|deny|UNTRUST
  style UNTRUST fill:#2a1a1a,stroke:#e85050,color:#e85050
  style DMZ fill:#1e1e10,stroke:#e8a020,color:#e8a020
  style TRUST fill:#1a2a1a,stroke:#3ddc84,color:#3ddc84`},
      {ts:'2024-05',label:'Mgmt zone split',changeType:'add',src:`graph LR
  UNTRUST[Untrust]-->DMZ
  DMZ-->TRUST[Trust]
  MGMT[Mgmt ★]-->TRUST
  MGMT-->DMZ
  style UNTRUST fill:#2a1a1a,stroke:#e85050,color:#e85050
  style DMZ fill:#1e1e10,stroke:#e8a020,color:#e8a020
  style TRUST fill:#1a2a1a,stroke:#3ddc84,color:#3ddc84
  style MGMT fill:#10182a,stroke:#7a9ae8,color:#7a9ae8`},
      {ts:'2024-10',label:'Azure zone',changeType:'add',src:`graph LR
  UNTRUST[Untrust]-->DMZ
  DMZ-->TRUST[Trust]
  MGMT[Mgmt]-->TRUST
  AZURE[Azure ★]-->|ER only|TRUST
  style UNTRUST fill:#2a1a1a,stroke:#e85050,color:#e85050
  style DMZ fill:#1e1e10,stroke:#e8a020,color:#e8a020
  style TRUST fill:#1a2a1a,stroke:#3ddc84,color:#3ddc84
  style MGMT fill:#10182a,stroke:#7a9ae8,color:#7a9ae8
  style AZURE fill:#10182a,stroke:#7a9ae8,color:#7a9ae8`},
      {ts:'2025-03',label:'Guest isolated',changeType:'change',src:`graph LR
  UNTRUST[Untrust]-->DMZ
  DMZ-->TRUST[Trust]
  MGMT[Mgmt]-->TRUST
  AZURE[Azure]-->|ER only|TRUST
  GUEST[Guest ★]-->|80,443|UNTRUST
  GUEST-->|deny|TRUST
  style UNTRUST fill:#2a1a1a,stroke:#e85050,color:#e85050
  style DMZ fill:#1e1e10,stroke:#e8a020,color:#e8a020
  style TRUST fill:#1a2a1a,stroke:#3ddc84,color:#3ddc84
  style MGMT fill:#10182a,stroke:#7a9ae8,color:#7a9ae8
  style AZURE fill:#10182a,stroke:#7a9ae8,color:#7a9ae8
  style GUEST fill:#2a1a2a,stroke:#aa60e8,color:#aa60e8`}
    ]
  },
  {
    id:'incident', title:'Incident Flow',
    versions:[
      {ts:'2024-01',label:'Ad-hoc',changeType:'init',src:`flowchart TD
  A[Alert fires]-->B{Who sees it?}
  B-->C[Someone handles it]
  C-->D[Maybe documented]
  style A fill:#2a1a1a,stroke:#e85050,color:#c8d4c8
  style B fill:#1a1a2a,stroke:#7a9ae8,color:#c8d4c8`},
      {ts:'2024-07',label:'Triage added',changeType:'change',src:`flowchart TD
  A[Alert fires]-->T[Triage ★]
  T-->|P1|P1[Incident Bridge]
  T-->|P2-3|Q[Queue]
  P1-->RES[Resolve]
  Q-->RES
  RES-->PIR[Post-incident ★]
  style A fill:#2a1a1a,stroke:#e85050,color:#c8d4c8
  style T fill:#1e1e2e,stroke:#e8a020,color:#e8a020
  style P1 fill:#2a1a1a,stroke:#e85050,color:#e85050
  style PIR fill:#1a2a1a,stroke:#3ddc84,color:#3ddc84`},
      {ts:'2025-01',label:'Runbooks',changeType:'add',src:`flowchart TD
  A[Alert fires]-->T[Triage]
  T-->|P1|P1[Incident Bridge]
  T-->|P2-3|Q[Queue]
  P1-->RB[Runbook ★]
  RB-->RES[Resolve]
  Q-->RES
  RES-->PIR[Post-incident]
  PIR-->RB2[Update runbook ★]
  style A fill:#2a1a1a,stroke:#e85050,color:#c8d4c8
  style T fill:#1e1e2e,stroke:#e8a020,color:#e8a020
  style RB fill:#10182a,stroke:#7a9ae8,color:#7a9ae8
  style RB2 fill:#10182a,stroke:#7a9ae8,color:#7a9ae8`}
    ]
  }
];

// ═══════════════════════════════════════════════════════
//  TIMELINE + STATE
// ═══════════════════════════════════════════════════════
const allTs = [...new Set(diagrams.flatMap(d=>d.versions.map(v=>v.ts)))].sort();
let masterIdx=0, playing=false, playTimer=null, speedIdx=0;
const speeds=[1,2,0.5], speedLbls=['1×','2×','½×'], BASE_MS=2200;

const tileState = {};
diagrams.forEach(d=>{tileState[d.id]={curIdx:0,detached:false,showSrc:false};});

// ── LAYOUT STORAGE ─────────────────────────────────────
const DEFAULT_LAYOUT = {
  'core-net': {x:40,  y:40,  w:400,h:380},
  'azure':    {x:460, y:40,  w:400,h:380},
  'fw-zones': {x:40,  y:450, w:400,h:380},
  'incident': {x:460, y:450, w:400,h:380},
};

function loadLayout() {
  try { const r=localStorage.getItem('arch-canvas-v3'); return r?JSON.parse(r):null; } catch{return null;}
}
function saveLayout() {
  const lay={};
  diagrams.forEach(d=>{
    const el=document.getElementById(`tile-${d.id}`);
    if(el) lay[d.id]={
      x:parseInt(el.style.left)||0, y:parseInt(el.style.top)||0,
      w:el.offsetWidth,             h:el.offsetHeight
    };
  });
  try{localStorage.setItem('arch-canvas-v3',JSON.stringify(lay));}catch{}
}
function resetLayout() {
  try{localStorage.removeItem('arch-canvas-v3');}catch{}
  diagrams.forEach(d=>{
    const el=document.getElementById(`tile-${d.id}`);
    const def=DEFAULT_LAYOUT[d.id]||{x:40,y:40,w:400,h:380};
    el.style.left=def.x+'px'; el.style.top=def.y+'px';
    el.style.width=def.w+'px'; el.style.height=def.h+'px';
  });
  updateMinimap();
}

// ═══════════════════════════════════════════════════════
//  MERMAID
// ═══════════════════════════════════════════════════════
mermaid.initialize({
  startOnLoad:false, theme:'dark',
  themeVariables:{background:'#111312',mainBkg:'#161918',nodeBorder:'#252a28',
    lineColor:'#3a4a3a',edgeLabelBackground:'#111312',titleColor:'#c2cec2'},
  flowchart:{curve:'basis',htmlLabels:true,useMaxWidth:true}
});

// ═══════════════════════════════════════════════════════
//  MASTER SLIDER
// ═══════════════════════════════════════════════════════
function buildMasterSlider(){
  const r=document.getElementById('master-range');
  r.max=allTs.length-1; r.value=masterIdx; updateMasterUI();
}
function updateMasterUI(){
  const pct=allTs.length>1?(masterIdx/(allTs.length-1))*100:0;
  document.getElementById('master-fill').style.width=pct+'%';
  document.getElementById('master-date').textContent=allTs[masterIdx];
  document.getElementById('master-range').value=masterIdx;
}
function onMasterInput(val){masterIdx=parseInt(val);updateMasterUI();applySyncedTiles();}

function versionIdxAtTime(diag,ts){let b=0;diag.versions.forEach((v,i)=>{if(v.ts<=ts)b=i;});return b;}
function applySyncedTiles(animate=true){
  diagrams.forEach(d=>{
    const st=tileState[d.id]; if(st.detached)return;
    const ni=versionIdxAtTime(d,allTs[masterIdx]);
    if(ni!==st.curIdx){st.curIdx=ni;renderTile(d.id,animate);flashTile(d.id);}
    else updateTileUI(d.id);
  });
}

// ═══════════════════════════════════════════════════════
//  TILE BUILDING
// ═══════════════════════════════════════════════════════
function buildTiles(){
  const canvas=document.getElementById('canvas-inner');
  const saved=loadLayout();
  canvas.innerHTML='';
  let topZ=10;
  diagrams.forEach((d,i)=>{
    const lay=(saved&&saved[d.id])?saved[d.id]:(DEFAULT_LAYOUT[d.id]||{x:40+i*440,y:40,w:400,h:380});
    const tile=document.createElement('div');
    tile.className='tile synced';
    tile.id=`tile-${d.id}`;
    tile.style.cssText=`left:${lay.x}px;top:${lay.y}px;width:${lay.w}px;height:${lay.h}px;z-index:${topZ+i}`;
    tile.innerHTML=`
      <div class="tile-head" id="head-${d.id}">
        <span class="tile-drag-icon">⠿⠿</span>
        <span class="tile-title">${d.title}</span>
        <div class="tile-head-right">
          <button class="src-btn" id="srcbtn-${d.id}" onclick="toggleSource('${d.id}')">⌥ src</button>
          <span class="sync-badge synced" id="badge-${d.id}" onclick="toggleDetach('${d.id}')">synced</span>
        </div>
      </div>
      <div class="tile-body">
        <div class="tile-diagram" id="diag-${d.id}"></div>
        <div class="tile-source"  id="src-${d.id}"><pre id="srcpre-${d.id}"></pre></div>
      </div>
      <div class="tile-footer">
        <div class="tile-version-row">
          <span class="tile-v-label"   id="vlabel-${d.id}">—</span>
          <span class="tile-v-badge"   id="vbadge-${d.id}"></span>
          <span class="tile-v-counter" id="vcnt-${d.id}"></span>
        </div>
        <div class="mini-timeline">
          <button class="mini-btn" id="mprev-${d.id}" onclick="tileStep('${d.id}',-1)">◀</button>
          <div class="mini-track-wrap">
            <div class="mini-track-bg"></div>
            <div class="mini-track-fill" id="mfill-${d.id}"></div>
            <div class="mini-dots-row"   id="mdots-${d.id}"></div>
            <input type="range" class="mini-range" id="mrange-${d.id}"
                   min="0" max="${d.versions.length-1}" step="1" value="0"
                   oninput="onTileRange('${d.id}',this.value)">
          </div>
          <button class="mini-btn" id="mnext-${d.id}" onclick="tileStep('${d.id}',1)">▶</button>
        </div>
      </div>
      <div class="resize-handle" id="rh-${d.id}"></div>`;
    canvas.appendChild(tile);
    attachDrag(d.id);
    attachResize(d.id);
  });
  buildMinimap();
}

// ═══════════════════════════════════════════════════════
//  TILE UI UPDATE + RENDER
// ═══════════════════════════════════════════════════════
function updateTileUI(id){
  const d=diagrams.find(x=>x.id===id);
  const st=tileState[id];
  const v=d.versions[st.curIdx];
  const n=d.versions.length;
  document.getElementById(`vlabel-${id}`).textContent=v.label;
  document.getElementById(`vcnt-${id}`).textContent=`${st.curIdx+1}/${n}`;
  const bEl=document.getElementById(`vbadge-${id}`);
  bEl.className=`tile-v-badge badge-${v.changeType}`;
  bEl.textContent={init:'init',add:'+add',change:'~chg',remove:'−rem'}[v.changeType];
  const pct=n>1?(st.curIdx/(n-1))*100:0;
  document.getElementById(`mfill-${id}`).style.width=pct+'%';
  document.getElementById(`mrange-${id}`).value=st.curIdx;
  const dotsEl=document.getElementById(`mdots-${id}`);
  dotsEl.innerHTML='';
  d.versions.forEach((_,i)=>{
    const dot=document.createElement('div');
    dot.className='mini-dot'+(i===st.curIdx?' cur':i<st.curIdx?' past':'');
    dot.onclick=e=>{e.stopPropagation();tileGoTo(id,i);};
    dotsEl.appendChild(dot);
  });
  document.getElementById(`mprev-${id}`).disabled=st.curIdx===0;
  document.getElementById(`mnext-${id}`).disabled=st.curIdx===n-1;
  // update source pre
  document.getElementById(`srcpre-${id}`).textContent=v.src.trim();
}

async function renderTile(id,animate=true){
  const d=diagrams.find(x=>x.id===id);
  const st=tileState[id];
  const el=document.getElementById(`diag-${id}`);
  if(!el)return;
  if(animate){el.classList.add('fading');await new Promise(r=>setTimeout(r,120));}
  try{
    const uid=`mm-${id}-${Date.now()}`;
    const{svg}=await mermaid.render(uid,d.versions[st.curIdx].src);
    el.innerHTML=svg;
  }catch(e){el.innerHTML=`<div class="tile-err">⚠ ${e.message}</div>`;}
  if(animate)el.classList.remove('fading');
  updateTileUI(id);
}

function flashTile(id){
  const t=document.getElementById(`tile-${id}`);
  t.classList.remove('flash'); void t.offsetWidth; t.classList.add('flash');
  setTimeout(()=>t.classList.remove('flash'),800);
}

// ═══════════════════════════════════════════════════════
//  SOURCE TOGGLE
// ═══════════════════════════════════════════════════════
function toggleSource(id){
  const st=tileState[id];
  st.showSrc=!st.showSrc;
  document.getElementById(`src-${id}`).classList.toggle('visible',st.showSrc);
  document.getElementById(`diag-${id}`).style.display=st.showSrc?'none':'';
  const btn=document.getElementById(`srcbtn-${id}`);
  btn.classList.toggle('active',st.showSrc);
  btn.textContent=st.showSrc?'⌥ diag':'⌥ src';
}

// ═══════════════════════════════════════════════════════
//  DRAG
// ═══════════════════════════════════════════════════════
function attachDrag(id){
  const head=document.getElementById(`head-${id}`);
  const tile=document.getElementById(`tile-${id}`);
  let sx,sy,ox,oy,topZ=100;
  head.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('sync-badge')||e.target.classList.contains('src-btn'))return;
    e.preventDefault();
    sx=e.clientX;sy=e.clientY;
    ox=parseInt(tile.style.left)||0;oy=parseInt(tile.style.top)||0;
    tile.classList.add('dragging'); tile.style.zIndex=++topZ;
    const mv=e=>{
      tile.style.left=Math.max(0,ox+(e.clientX-sx))+'px';
      tile.style.top =Math.max(0,oy+(e.clientY-sy))+'px';
      updateMinimap();
    };
    const up=()=>{
      tile.classList.remove('dragging'); saveLayout(); updateMinimap();
      document.removeEventListener('mousemove',mv);
      document.removeEventListener('mouseup',up);
    };
    document.addEventListener('mousemove',mv);
    document.addEventListener('mouseup',up);
  });
  tile.addEventListener('mousedown',()=>{ tile.style.zIndex=++topZ; });
}

// ═══════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════
function attachResize(id){
  const handle=document.getElementById(`rh-${id}`);
  const tile  =document.getElementById(`tile-${id}`);
  let sx,sy,ow,oh;
  let rerenderTimer=null;

  handle.addEventListener('mousedown',e=>{
    e.preventDefault(); e.stopPropagation();
    sx=e.clientX; sy=e.clientY;
    ow=tile.offsetWidth; oh=tile.offsetHeight;
    tile.classList.add('resizing');

    const mv=e=>{
      const nw=Math.max(280, ow+(e.clientX-sx));
      const nh=Math.max(260, oh+(e.clientY-sy));
      tile.style.width =nw+'px';
      tile.style.height=nh+'px';
      updateMinimap();
      // debounce re-render so mermaid re-fits SVG to new size
      clearTimeout(rerenderTimer);
      rerenderTimer=setTimeout(()=>renderTile(id,false),300);
    };
    const up=()=>{
      tile.classList.remove('resizing');
      saveLayout(); updateMinimap();
      renderTile(id,false);
      document.removeEventListener('mousemove',mv);
      document.removeEventListener('mouseup',up);
    };
    document.addEventListener('mousemove',mv);
    document.addEventListener('mouseup',up);
  });
}

// ═══════════════════════════════════════════════════════
//  TILE CONTROLS
// ═══════════════════════════════════════════════════════
function toggleDetach(id){
  const st=tileState[id]; st.detached=!st.detached;
  const tile=document.getElementById(`tile-${id}`);
  const badge=document.getElementById(`badge-${id}`);
  if(st.detached){
    tile.classList.replace('synced','detached');
    badge.className='sync-badge detached'; badge.textContent='detached';
  }else{
    tile.classList.replace('detached','synced');
    badge.className='sync-badge synced'; badge.textContent='synced';
    st.curIdx=versionIdxAtTime(diagrams.find(d=>d.id===id),allTs[masterIdx]);
    renderTile(id);
  }
}
function syncAll(){
  diagrams.forEach(d=>{
    const st=tileState[d.id]; if(!st.detached)return;
    st.detached=false;
    document.getElementById(`tile-${d.id}`).classList.replace('detached','synced');
    const badge=document.getElementById(`badge-${d.id}`);
    badge.className='sync-badge synced'; badge.textContent='synced';
    st.curIdx=versionIdxAtTime(d,allTs[masterIdx]); renderTile(d.id);
  });
}
function tileGoTo(id,idx){
  const st=tileState[id];
  const diag=diagrams.find(d=>d.id===id);
  if(!st.detached){
    st.detached=true;
    document.getElementById(`tile-${id}`).classList.replace('synced','detached');
    const badge=document.getElementById(`badge-${id}`);
    badge.className='sync-badge detached'; badge.textContent='detached';
  }
  st.curIdx=Math.max(0,Math.min(diag.versions.length-1,idx));
  renderTile(id);
}
function tileStep(id,d){tileGoTo(id,tileState[id].curIdx+d);}
function onTileRange(id,val){tileGoTo(id,parseInt(val));}

// ═══════════════════════════════════════════════════════
//  PLAYBACK
// ═══════════════════════════════════════════════════════
function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('btn-play');
  if(playing){btn.textContent='⏸';btn.classList.add('active');scheduleNext();}
  else{btn.textContent='▶';btn.classList.remove('active');clearTimeout(playTimer);}
}
function scheduleNext(){
  if(!playing)return;
  playTimer=setTimeout(()=>{
    masterIdx=(masterIdx+1)%allTs.length;
    updateMasterUI();applySyncedTiles();scheduleNext();
  },BASE_MS/speeds[speedIdx]);
}
function cycleSpeed(){
  speedIdx=(speedIdx+1)%speeds.length;
  document.getElementById('btn-speed').textContent=speedLbls[speedIdx];
  if(playing){clearTimeout(playTimer);scheduleNext();}
}

// ═══════════════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════════════
function buildMinimap(){
  const mm=document.getElementById('minimap');
  mm.querySelectorAll('.minimap-dot').forEach(e=>e.remove());
  diagrams.forEach(d=>{
    const dot=document.createElement('div');
    dot.className='minimap-dot'; dot.id=`mm-dot-${d.id}`;
    mm.appendChild(dot);
  });
  updateMinimap();
}
function updateMinimap(){
  const CW=2400,CH=1600,MW=160,MH=100;
  const sx=MW/CW,sy=MH/CH;
  diagrams.forEach(d=>{
    const tile=document.getElementById(`tile-${d.id}`);
    const dot =document.getElementById(`mm-dot-${d.id}`);
    if(!tile||!dot)return;
    dot.style.left  =(parseInt(tile.style.left)||0)*sx+'px';
    dot.style.top   =(parseInt(tile.style.top)||0)*sy+'px';
    dot.style.width =tile.offsetWidth*sx+'px';
    dot.style.height=tile.offsetHeight*sy+'px';
  });
  const outer=document.getElementById('canvas-outer');
  const vp=document.getElementById('minimap-vp');
  vp.style.left  =outer.scrollLeft*sx+'px';
  vp.style.top   =outer.scrollTop*sy+'px';
  vp.style.width =outer.clientWidth*sx+'px';
  vp.style.height=outer.clientHeight*sy+'px';
}
document.getElementById('canvas-outer').addEventListener('scroll',updateMinimap);

// keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'){masterIdx=Math.min(allTs.length-1,masterIdx+1);updateMasterUI();applySyncedTiles();}
  if(e.key==='ArrowLeft') {masterIdx=Math.max(0,masterIdx-1);updateMasterUI();applySyncedTiles();}
  if(e.key===' ')         {togglePlay();e.preventDefault();}
});

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
buildMasterSlider();
buildTiles();
(async()=>{
  for(const d of diagrams) await renderTile(d.id,false);
  applySyncedTiles(false);
})();
</script>
