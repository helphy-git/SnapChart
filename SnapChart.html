<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0d0c;color:#c2cec2;font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.025) 3px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:9999}

.hdr{display:flex;align-items:baseline;gap:14px;padding:11px 20px;background:#111312;border-bottom:1px solid #1c1f1e;flex-shrink:0}
.hdr-name{font-size:11px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:#e8a020}
.hdr-sub{font-size:9px;color:#455045;letter-spacing:.07em}

.bc{display:flex;align-items:center;padding:8px 20px;background:#111312;border-bottom:1px solid #1c1f1e;gap:0;min-height:38px}
.bc-back{font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:3px 9px;border:1px solid #252a28;border-radius:2px;color:#7a8a7a;background:transparent;font-family:'IBM Plex Mono',monospace;transition:all .12s;margin-right:12px;white-space:nowrap}
.bc-back:hover{border-color:#e8a020;color:#e8a020}
.bc-back.hidden{visibility:hidden;pointer-events:none}
.bc-item{font-size:10px;letter-spacing:.05em;color:#7a8a7a;cursor:pointer;padding:2px 4px;transition:color .12s}
.bc-item:hover{color:#c2cec2}
.bc-item.cur{color:#c2cec2;cursor:default}
.bc-sep{font-size:10px;color:#252a28;padding:0 5px}

.canvas{flex:1;overflow:auto;padding:28px 24px;transition:opacity .18s;background:#0b0d0c;background-image:radial-gradient(circle,#1c201e 1px,transparent 1px);background-size:28px 28px}
.canvas::-webkit-scrollbar{width:6px;height:6px}
.canvas::-webkit-scrollbar-track{background:transparent}
.canvas::-webkit-scrollbar-thumb{background:#252a28;border-radius:3px}

.svg-wrap{max-width:680px;margin:0 auto}
svg{display:block;overflow:visible}

.nd-expand{cursor:pointer}
.nd-expand:hover .nd-rect{stroke:#6a9abb!important;fill:#131e28!important}
.nd-process:hover .nd-rect,.nd-start:hover .nd-rect,.nd-end:hover .nd-rect{opacity:.88}
.nd-decision:hover polygon{opacity:.85}

/* anchor node shown above drilled flow */
.anchor-wrap{max-width:680px;margin:0 auto 0;display:flex;flex-direction:column;align-items:center;gap:0}
.anchor-node{display:flex;align-items:center;gap:9px;padding:7px 18px;background:#0b1520;border:1px dashed #2a4a6a;border-radius:4px;cursor:pointer;transition:all .14s;user-select:none}
.anchor-node:hover{background:#111e2e;border-color:#4a7aaa}
.anchor-node-label{font-size:10px;font-weight:500;letter-spacing:.06em;color:#7a9ae8;font-family:'IBM Plex Mono',monospace}
.anchor-node-from{font-size:8px;color:#455045;letter-spacing:.07em;font-family:'IBM Plex Mono',monospace}
.anchor-arrow{width:2px;height:22px;background:linear-gradient(to bottom,#2a4a6a,#1c1f1e);margin:0 auto}
.anchor-hidden{display:none}

/* ghost minimap of parent flow */
.ghost-wrap{position:absolute;top:12px;right:12px;width:160px;pointer-events:none;opacity:.22;transition:opacity .2s}
.ghost-wrap:hover{opacity:.5;pointer-events:all;cursor:pointer}
.ghost-label{font-size:8px;color:#455045;letter-spacing:.08em;text-align:center;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase}

.canvas{position:relative}

.leg{flex-shrink:0;padding:5px 20px;background:#111312;border-top:1px solid #1c1f1e;display:flex;gap:20px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:6px;font-size:8px;color:#455045;letter-spacing:.06em}
.sw{width:14px;height:10px;border-radius:1px;border:1px solid;display:inline-block}
.sw-exp{border-style:dashed}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-name">Flow Explorer</span>
  <span class="hdr-sub">click expandable nodes ( ⊕ ) to drill into sub-flows · Esc to go back</span>
</div>

<div class="bc" id="bc">
  <button class="bc-back hidden" id="bc-back" onclick="goBack()">← Back</button>
</div>

<div class="canvas" id="canvas">
  <div class="anchor-hidden" id="anchor-wrap">
    <div class="anchor-wrap">
      <div class="anchor-node" id="anchor-node" onclick="goBack()">
        <span style="font-size:11px;color:#2a4a6a">&#8592;</span>
        <div>
          <div class="anchor-node-from">entered from</div>
          <div class="anchor-node-label" id="anchor-label">&#8212;</div>
        </div>
        <span style="font-size:9px;color:#2a4a6a;margin-left:4px;font-family:'IBM Plex Mono',monospace">click to return</span>
      </div>
      <div class="anchor-arrow"></div>
    </div>
  </div>
  <div style="position:relative">
    <div class="svg-wrap" id="svg-wrap"></div>
    <div class="ghost-wrap" id="ghost-wrap" style="display:none" onclick="goBack()" title="Return to parent flow">
      <div class="ghost-label">&#8593; parent flow</div>
      <div id="ghost-svg"></div>
    </div>
  </div>
</div>

<div class="leg">
  <span class="leg-i"><span class="sw sw-exp" style="background:#0e1820;border-color:#2a4a6a"></span>expandable — click to drill down</span>
  <span class="leg-i"><span class="sw" style="background:#1a1a0a;border-color:#5a4010;transform:rotate(45deg)"></span>decision</span>
  <span class="leg-i"><span class="sw" style="background:#161918;border-color:#252a28"></span>process step</span>
  <span class="leg-i"><span class="sw" style="background:#1a2a1a;border-color:#3ddc84;border-radius:5px"></span>start / end</span>
</div>

<script>
const D={
  start:   {w:140,h:38,hw:70,hh:19},
  end:     {w:140,h:38,hw:70,hh:19},
  process: {w:160,h:44,hw:80,hh:22},
  expand:  {w:160,h:44,hw:80,hh:22},
  decision:{w:190,h:70,hw:95,hh:35},
};

const C={
  start:   {f:'#1a2a1a',s:'#3ddc84',t:'#3ddc84'},
  end:     {f:'#10182a',s:'#5a7aaa',t:'#7a9ae8'},
  process: {f:'#161918',s:'#252a28',t:'#c2cec2'},
  expand:  {f:'#0e1820',s:'#2a4a6a',t:'#7a9ae8'},
  decision:{f:'#1a1a0a',s:'#5a4010',t:'#e8a020'},
};

const EC='#2a3a2a', LC='#455045';

const FLOWS={
  root:{
    title:'Email processing pipeline',
    nodes:[
      {id:'start',    x:340,y:60,  type:'start',   label:'Incoming email'},
      {id:'parse',    x:340,y:150, type:'process',  label:'Parse & validate'},
      {id:'classify', x:340,y:245, type:'expand',   label:'Classify email',      drilldown:'classify',hint:'5 categories'},
      {id:'route',    x:340,y:340, type:'expand',   label:'Route to handler',    drilldown:'routing', hint:'priority routing'},
      {id:'done',     x:340,y:425, type:'end',      label:'Complete'},
    ],
    edges:[
      {from:'start',    to:'parse'},
      {from:'parse',    to:'classify'},
      {from:'classify', to:'route',  label:'categorized'},
      {from:'route',    to:'done'},
    ]
  },

  classify:{
    title:'Email classification',
    nodes:[
      {id:'meta',     x:340,y:60,  type:'process', label:'Extract metadata'},
      {id:'spam',     x:340,y:160, type:'decision', label:'Spam score > 0.7?'},
      {id:'quar',     x:170,y:285, type:'expand',  label:'Quarantine',       drilldown:'spam',   hint:'review process'},
      {id:'domain',   x:510,y:285, type:'decision', label:'Known sender?'},
      {id:'internal', x:400,y:390, type:'process', label:'Internal email'},
      {id:'vendor',   x:558,y:390, type:'expand',  label:'Vendor email',     drilldown:'vendor', hint:'vendor handling'},
      {id:'tag',      x:340,y:480, type:'process', label:'Tag & prioritize'},
    ],
    edges:[
      {from:'meta',     to:'spam'},
      {from:'spam',     to:'quar',     label:'yes',  fromPort:'left',   toPort:'top'},
      {from:'spam',     to:'domain',   label:'no',   fromPort:'right',  toPort:'top'},
      {from:'quar',     to:'tag',      routeType:'lbend'},
      {from:'domain',   to:'internal', label:'yes',  fromPort:'left',   toPort:'top'},
      {from:'domain',   to:'vendor',   label:'no',   fromPort:'bottom', toPort:'top'},
      {from:'internal', to:'tag'},
      {from:'vendor',   to:'tag'},
    ]
  },

  spam:{
    title:'Spam & quarantine handling',
    nodes:[
      {id:'s_score', x:340,y:60,  type:'process',  label:'Get confidence score'},
      {id:'s_high',  x:340,y:155, type:'decision',  label:'Score > 0.95?'},
      {id:'s_del',   x:170,y:275, type:'end',       label:'Auto-delete'},
      {id:'s_hold',  x:510,y:275, type:'process',   label:'Hold 24 hours'},
      {id:'s_check', x:510,y:370, type:'decision',  label:'User released?'},
      {id:'s_deliv', x:370,y:462, type:'end',       label:'Deliver to inbox'},
      {id:'s_purge', x:555,y:462, type:'end',       label:'Purge'},
    ],
    edges:[
      {from:'s_score', to:'s_high'},
      {from:'s_high',  to:'s_del',   label:'yes', fromPort:'left',   toPort:'top'},
      {from:'s_high',  to:'s_hold',  label:'no',  fromPort:'right',  toPort:'top'},
      {from:'s_hold',  to:'s_check'},
      {from:'s_check', to:'s_deliv', label:'yes', fromPort:'left',   toPort:'top'},
      {from:'s_check', to:'s_purge', label:'no',  fromPort:'bottom', toPort:'top'},
    ]
  },

  vendor:{
    title:'Vendor email handling',
    nodes:[
      {id:'v_ext',   x:340,y:60,  type:'process',  label:'Extract vendor ID'},
      {id:'v_known', x:340,y:155, type:'decision',  label:'Known vendor?'},
      {id:'v_match', x:195,y:270, type:'process',   label:'Match to contract'},
      {id:'v_new',   x:485,y:270, type:'process',   label:'Flag new vendor'},
      {id:'v_route', x:340,y:365, type:'process',   label:'Route to procurement'},
      {id:'v_done',  x:340,y:452, type:'end',       label:'Notify & log'},
    ],
    edges:[
      {from:'v_ext',   to:'v_known'},
      {from:'v_known', to:'v_match', label:'yes', fromPort:'left',  toPort:'top'},
      {from:'v_known', to:'v_new',   label:'no',  fromPort:'right', toPort:'top'},
      {from:'v_match', to:'v_route'},
      {from:'v_new',   to:'v_route'},
      {from:'v_route', to:'v_done'},
    ]
  },

  routing:{
    title:'Route to handler',
    nodes:[
      {id:'r_pri',    x:340,y:60,  type:'decision', label:'Priority level?'},
      {id:'r_high',   x:170,y:165, type:'process',  label:'High priority'},
      {id:'r_normal', x:340,y:165, type:'process',  label:'Normal queue'},
      {id:'r_low',    x:510,y:165, type:'process',  label:'Low priority'},
      {id:'r_assign', x:340,y:260, type:'process',  label:'Assign owner'},
      {id:'r_log',    x:340,y:350, type:'end',      label:'Notify & log'},
    ],
    edges:[
      {from:'r_pri',    to:'r_high',   label:'high',   fromPort:'left',   toPort:'top'},
      {from:'r_pri',    to:'r_normal', label:'normal', fromPort:'bottom', toPort:'top'},
      {from:'r_pri',    to:'r_low',    label:'low',    fromPort:'right',  toPort:'top'},
      {from:'r_high',   to:'r_assign'},
      {from:'r_normal', to:'r_assign'},
      {from:'r_low',    to:'r_assign'},
      {from:'r_assign', to:'r_log'},
    ]
  },
};

function portXY(node,port){
  const d=D[node.type],{x,y}=node;
  switch(port||'bottom'){
    case 'top':    return [x,y-d.hh];
    case 'bottom': return [x,y+d.hh];
    case 'left':   return [x-d.hw,y];
    case 'right':  return [x+d.hw,y];
  }
}

function svgH(nodes){
  return nodes.reduce((m,n)=>Math.max(m,n.y+D[n.type].hh),0)+52;
}

function nodeHTML(n){
  const {x,y,type,label,id,drilldown}=n;
  const d=D[type], c=C[type];
  const fn=drilldown?`nav('${drilldown}')`:'';
  const cls=drilldown?'nd-expand':`nd-${type}`;
  const ttl=drilldown&&FLOWS[drilldown]?FLOWS[drilldown].title:'';

  if(type==='decision'){
    const pts=`${x},${y-d.hh} ${x+d.hw},${y} ${x},${y+d.hh} ${x-d.hw},${y}`;
    return `<g class="${cls}"${fn?` onclick="${fn}"`:''}${ttl?` style="cursor:pointer"`:''}>
      ${ttl?`<title>Drill down: ${ttl}</title>`:''}
      <polygon points="${pts}" fill="${c.f}" stroke="${c.s}" stroke-width="0.8"/>
      <text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central"
        fill="${c.t}" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="500">${label}</text>
    </g>`;
  }

  const rx=(type==='start'||type==='end')?d.hh:8;
  const dash=type==='expand'?' stroke-dasharray="5 3"':'';
  const sw=type==='expand'?'1':'0.8';

  let ind='';
  if(type==='expand'){
    const ix=x+d.hw-11, iy=y-d.hh+11;
    ind=`<circle cx="${ix}" cy="${iy}" r="5" fill="none" stroke="${c.s}" stroke-width="1"/>
      <line x1="${ix}" y1="${iy-3}" x2="${ix}" y2="${iy+3}" stroke="${c.s}" stroke-width="1"/>
      <line x1="${ix-3}" y1="${iy}" x2="${ix+3}" y2="${iy}" stroke="${c.s}" stroke-width="1"/>`;
  }

  return `<g class="${cls}"${fn?` onclick="${fn}"`:''} style="${drilldown?'cursor:pointer':''}">
    ${ttl?`<title>Drill down: ${ttl}</title>`:''}
    <rect class="nd-rect" x="${x-d.hw}" y="${y-d.hh}" width="${d.w}" height="${d.h}" rx="${rx}"
      fill="${c.f}" stroke="${c.s}" stroke-width="${sw}"${dash}/>
    <text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central"
      fill="${c.t}" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="500">${label}</text>
    ${ind}
  </g>`;
}

function edgeHTML(flow,edge){
  const from=flow.nodes.find(n=>n.id===edge.from);
  const to=flow.nodes.find(n=>n.id===edge.to);
  const fp=edge.fromPort||'bottom', tp=edge.toPort||'top';
  let [sx,sy]=portXY(from,fp), [ex,ey]=portXY(to,tp);
  const G=6;
  if(fp==='bottom')sy+=G; else if(fp==='top')sy-=G;
  else if(fp==='left')sx-=G; else if(fp==='right')sx+=G;
  if(tp==='top')ey-=G; else if(tp==='bottom')ey+=G;

  let pathD;
  if(edge.routeType==='lbend'){
    const maxY=flow.nodes.filter(n=>n.id!==edge.from&&n.id!==edge.to)
      .reduce((m,n)=>Math.max(m,n.y+D[n.type].hh),0);
    const shY=maxY+26;
    pathD=`M ${sx} ${sy} L ${sx} ${shY} L ${ex} ${shY} L ${ex} ${ey}`;
  } else {
    pathD=`M ${sx} ${sy} L ${ex} ${ey}`;
  }

  let lbl='';
  if(edge.label){
    const dx=ex-sx, dy=ey-sy;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const t=0.22, px=-dy/len*10, py=dx/len*10;
    const lx=(sx+dx*t+px).toFixed(1), ly=(sy+dy*t+py).toFixed(1);
    lbl=`<text x="${lx}" y="${ly}" text-anchor="middle" fill="${LC}"
      font-family="IBM Plex Mono,monospace" font-size="10">${edge.label}</text>`;
  }

  return `<path d="${pathD}" fill="none" stroke="${EC}" stroke-width="1.5" marker-end="url(#arr)"/>
${lbl}`;
}

function renderFlow(){
  const fid=navStack[navStack.length-1];
  const flow=FLOWS[fid];
  const h=svgH(flow.nodes);
  const edges=flow.edges.map(e=>edgeHTML(flow,e)).join('\n');
  const nodes=flow.nodes.map(n=>nodeHTML(n)).join('\n');
  document.getElementById('svg-wrap').innerHTML=`
<svg width="100%" viewBox="0 0 680 ${h}" style="overflow:visible">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="${EC}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  ${edges}
  ${nodes}
</svg>`;
  renderAnchor();
}

function renderAnchor(){
  const aw=document.getElementById('anchor-wrap');
  const gw=document.getElementById('ghost-wrap');
  if(navStack.length<=1){
    aw.className='anchor-hidden';
    gw.style.display='none';
    return;
  }
  // find the node in the parent flow that triggered this drilldown
  const parentFid=navStack[navStack.length-2];
  const currentFid=navStack[navStack.length-1];
  const parentFlow=FLOWS[parentFid];
  const entryNode=parentFlow.nodes.find(n=>n.drilldown===currentFid);
  const lbl=entryNode?entryNode.label:parentFlow.title;
  document.getElementById('anchor-label').textContent=lbl;
  aw.className='';

  // ghost minimap of parent flow
  const pflow=parentFlow;
  const gh=svgH(pflow.nodes);
  const scale=160/680;
  const gh_h=Math.round(gh*scale);
  const pedges=pflow.edges.map(e=>edgeHTML(pflow,e)).join('\n');
  // render nodes, highlighting the entry node
  const pnodes=pflow.nodes.map(n=>{
    const isEntry=entryNode&&n.id===entryNode.id;
    const d=D[n.type],c=isEntry?{f:'#1a2e40',s:'#5a9ace',t:'#7ab8e8'}:C[n.type];
    const {x,y,type,label}=n;
    if(type==='decision'){
      const pts=`${x},${y-d.hh} ${x+d.hw},${y} ${x},${y+d.hh} ${x-d.hw},${y}`;
      return `<polygon points="${pts}" fill="${c.f}" stroke="${c.s}" stroke-width="${isEntry?2:0.5}"/>`;
    }
    const rx=(type==='start'||type==='end')?d.hh:8;
    return `<rect x="${x-d.hw}" y="${y-d.hh}" width="${d.w}" height="${d.h}" rx="${rx}" fill="${c.f}" stroke="${c.s}" stroke-width="${isEntry?2:0.5}"${type==='expand'?' stroke-dasharray="5 3"':''}/>`;
  }).join('\n');
  document.getElementById('ghost-svg').innerHTML=`<svg width="160" height="${gh_h}" viewBox="0 0 680 ${gh}" style="display:block">
  <defs><marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="${EC}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker></defs>
  ${pedges.replace(/url\(#arr\)/g,'url(#arr2)')}
  ${pnodes}
</svg>`;
  gw.style.display='block';
}

function renderBc(){
  const bc=document.getElementById('bc');
  const parts=navStack.map((fid,i)=>{
    const f=FLOWS[fid];
    const isLast=i===navStack.length-1;
    if(isLast) return `<span class="bc-item cur">${f.title}</span>`;
    return `<span class="bc-item" onclick="goTo(${i})">${f.title}</span>`;
  }).join('<span class="bc-sep">›</span>');
  const back=navStack.length>1?'':'hidden';
  bc.innerHTML=`<button class="bc-back ${back}" onclick="goBack()">← Back</button>${parts}`;
}

let navStack=['root'];

function transition(cb){
  const c=document.getElementById('canvas');
  c.style.opacity='0';
  setTimeout(()=>{
    cb();
    c.style.opacity='1';
    c.scrollTop=0;
  },180);
}

function nav(fid){
  if(!FLOWS[fid])return;
  transition(()=>{navStack.push(fid);renderFlow();renderBc();});
}

function goBack(){
  if(navStack.length<=1)return;
  transition(()=>{navStack.pop();renderFlow();renderBc();});
}

function goTo(idx){
  if(idx>=navStack.length-1)return;
  transition(()=>{navStack=navStack.slice(0,idx+1);renderFlow();renderBc();});
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&navStack.length>1)goBack();
});

renderBc();
renderFlow();
</script>
</body>
</html>
